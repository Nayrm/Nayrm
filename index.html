<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <meta name="viewport" content="initial-scale=1.0, width=device-width" />
    <link rel="stylesheet" href="D:\programming_stuff\SynthPortfolio\css\index.css">
    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
        }

        .text-container {
            margin-right: 60px; /* Space between the text and the image */
            width: 35%;
            }

        .flex-container {
            display: flex; /* Use Flexbox */
            align-items: center; /* Center items vertically */
            justify-content: center; /* Center items horizontally */
        }

        .mysummary {
            
            text-align: left;
            color: black;
            font-size: 1.8rem;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }

        .centerblock {
            z-index: 1;
            position: relative;
        }

        .centerblock img {
            display: block;
            width: 200px;
            height: 220px;
            object-fit: cover; /* Adjust this property as needed */
            border-radius: 100px;
            
        }

        .centerblock::before {
            content: "";
            position: absolute;
            top: -15px;
            left: -20px;
            right: -15px;
            bottom: -20px;
            background: radial-gradient(circle, transparent 60%, black 60%);
            border-radius: 50%;
            animation: wavy-border 2s infinite ease-in-out;
            z-index: -2;
}

@keyframes wavy-border {
    0%, 100% {
        border-radius: 45% 55% 60% 40% / 55% 45% 55% 45%;
    }
    50% {
        border-radius: 55% 45% 40% 60% / 45% 55% 45% 55%;
    }
}

        #topleft,
        #topright,
        #bottomleft,
        #bottomright {
            position: absolute;
            width: 50%;
            height: 50%;
            background-color: #f0f0f0; /* Set a background color for the border */
            z-index: -5; /* Place the border below the image */
        }


    </style>
</head>
<body>
    <div class="flex-container">
        <div class="text-container">
            <p class="mysummary">Welcome!</p>
            <p class="mysummary">My name is Ryan T. Mijangos</p>
            <p class="mysummary">I am a full-stack software developer based out of Valrico, FL</p>
        </div>
        <div class="centerblock">
            <img src="images\image_6483441 (7).JPG" alt="Description of the image">
        </div>
    </div>

   
</body>
</html>
