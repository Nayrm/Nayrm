<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <meta name="viewport" content="initial-scale=1.0, width=device-width" />
    <link rel="stylesheet" href="D:\programming_stuff\SynthPortfolio\css\index.css">
    <style>
        body {
            margin: 0;
            display: grid;
            place-items: center;
            height: 100vh;
        }

        .text-container {
            margin-right: 60px; /* Space between the text and the image */
            width: 35%;
            }

        .flex-container {
            display: flex; /* Use Flexbox */
            align-items: center; /* Center items vertically */
            justify-content: center; /* Center items horizontally */
           
            border-radius: 10px; /* Round the corners */
        }

        .mysummary {
            
            text-align: left;
            color: black;
            font-size: 1.5rem;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }

        .centerblock {
            z-index: 1;
            position: relative;
        }

        .centerblock img {
            display: block;
            width: 200px;
            height: 220px;
            object-fit: cover; /* Adjust this property as needed */
            border-radius: 100px;
            
        }

        .centerblock::before {
            content: "";
            position: absolute;
            top: -15px;
            left: -20px;
            right: -15px;
            bottom: -20px;
            background: radial-gradient(circle, transparent 60%, black 60%);
            border-radius: 50%;
            animation: wavy-border 2s infinite ease-in-out;
            z-index: -2;
}

@keyframes wavy-border {
    0%, 100% {
        border-radius: 45% 55% 60% 40% / 55% 45% 55% 45%;
    }
    50% {
        border-radius: 55% 45% 40% 60% / 45% 55% 45% 55%;
    }
}

@media (max-width: 768px) {
    .flex-container {
        flex-direction: row; /* Keep text and image side by side */
    }

    .text-container {
        margin-right: 20px; /* Adjusted space between text and image */
        width: 50%; /* Adjust width for smaller screens */
    }

    .mysummary {
        font-size: 1rem; /* Adjust font size for smaller screens */
    }

    .centerblock img {
        width: 150px; /* Adjust image size for smaller screens */
        height: 165px;
    }
}

@media (max-width: 480px) {
    .text-container {
        width: 40%; /* Further adjust width for very small screens */
    }

    .centerblock img {
        width: 120px; /* Further adjust image size for mobile phones */
        height: 132px;
    }

    .centerblock::before {
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px; /* Adjust the border effect for smaller screens */
    }
}


    </style>
</head>
<body>
    <div class="flex-container">
        <div class="text-container">
            <p class="mysummary">Welcome</p>
            <p class="mysummary">My name is Ryan T. Mijangos</p>
            <p class="mysummary">I am a full-stack software developer based out of Valrico, FL</p>
        </div>
        <div class="centerblock">
            <img src="images\image_6483441 (7).JPG" alt="Description of the image">
        </div>
    </div>


</body>
</html>
